[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mover_status"
version = "0.1.0"
description = "A Python 3.13 application to monitor Unraid's mover process and send notifications"
readme = "README.md"
requires-python = ">=3.13"
license = {text = "AGPL-3.0-or-later"}
authors = [
    {name = "engels74", email = "engels74@tuta.io"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "pyyaml>=6.0",
    "requests>=2.31.0",
    "psutil>=5.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "basedpyright>=1.0.0",
]

[project.urls]
"Homepage" = "https://github.com/engels74/mover-status"
"Bug Tracker" = "https://github.com/engels74/mover-status/issues"

[project.scripts]
mover-status = "mover_status.__main__:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
python_classes = "Test*"
addopts = "--cov=mover_status --cov-report=term-missing"

[tool.basedpyright]
typeCheckingMode = "strict"
pythonVersion = "3.13"
reportMissingTypeStubs = false
reportUnknownMemberType = false
reportUnnecessaryIsInstance = false
reportUnknownVariableType = false
