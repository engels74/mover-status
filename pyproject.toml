[build-system]
requires = ["hatchling>=1.18.0"]
build-backend = "hatchling.build"

[project]
name = "mover_status"
version = "0.1.0"
description = "A Python 3.13 application to monitor Unraid's mover process and send notifications"
readme = "README.md"
requires-python = ">=3.13"
license = {text = "AGPL-3.0-or-later"}
authors = [
    {name = "engels74", email = "engels74@tuta.io"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Monitoring",
    "Operating System :: POSIX :: Linux",
    "Environment :: Console",
]
dependencies = [
    # Core dependencies
    "pyyaml>=6.0",          # Configuration file parsing
    "requests>=2.31.0",      # HTTP requests for notifications and version checking
    "psutil>=5.9.0",         # Process monitoring and system information
]

[project.optional-dependencies]
dev = [
    # Testing and development dependencies
    "pytest>=7.4.0",         # Testing framework
    "pytest-cov>=4.1.0",     # Test coverage reporting
    "basedpyright>=1.0.0",   # Type checking
    "types-requests>=2.31.0", # Type stubs for requests
    "types-pyyaml>=6.0",     # Type stubs for pyyaml
    "types-psutil>=7.0.0",   # Type stubs for psutil
]
docker = [
    # Docker-specific dependencies
    "docker>=7.0.0",         # Docker API for container monitoring
]

[project.urls]
"Homepage" = "https://github.com/engels74/mover-status"
"Bug Tracker" = "https://github.com/engels74/mover-status/issues"
"Documentation" = "https://github.com/engels74/mover-status/wiki"
"Source Code" = "https://github.com/engels74/mover-status"

[project.scripts]
mover-status = "mover_status.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["mover_status"]

[tool.hatch.build.targets.sdist]
include = [
    "mover_status",
    "tests",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
python_classes = "Test*"
addopts = "--cov=mover_status --cov-report=term-missing"

[tool.basedpyright]
typeCheckingMode = "recommended"
pythonVersion = "3.13"
# Original disabled settings (kept as reference):
reportMissingTypeStubs = true  # Enable this to catch missing type stubs
reportUnknownMemberType = true  # Enable this to catch untyped class members
reportUnnecessaryIsInstance = true  # Enable to catch redundant isinstance checks
reportUnknownVariableType = true  # Enable this to catch untyped variables
enableTypeIgnoreComments = false  # Disable type:ignore comments in favor of pyright:ignore
