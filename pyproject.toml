# pyproject.toml

[project]
name = "mover-status"
version = "0.1.0"
description = "A Python-based monitoring system for Unraid Mover process with Discord and Telegram notifications"
readme = "README.md"
requires-python = ">=3.12"
license = { file = "LICENSE" }
authors = [
    { name = "engels74", email = "engels74@tuta.io" }
]
keywords = ["unraid", "mover", "monitoring", "discord", "telegram"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3.12",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "pydantic>=2",
    "pydantic-settings",
    "pyyaml",
    "aiohttp",
    "python-dotenv",
    "structlog",
    "tenacity",
    "typing-extensions",
    "aiofiles",
    "psutil"
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "pytest-mock",
    "aioresponses",
]
dev = [
    "black",
    "isort",
    "mypy",
    "ruff",
    "pre-commit",
]

[project.urls]
Homepage = "https://github.com/engels74/mover-status"
Documentation = "https://github.com/engels74/mover-status/wiki"
Repository = "https://github.com/engels74/mover-status.git"
Issues = "https://github.com/engels74/mover-status/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.pytest.ini_options]
addopts = "-v"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = ["mover-status"]
omit = ["tests/*", "**/__init__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.black]
line-length = 88
target-version = ["py312"]
include = '\.pyi?$'

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
line_length = 88

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "B",  # flake8-bugbear
    "C",  # flake8-comprehensions
    "I",  # isort
]
ignore = ["E501"]  # line length handled by black

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
show_error_codes = true

[tool.pyright]
include = ["."]
exclude = [
    "**/__pycache__",
    ".venv",
    ".git",
    "tests",
    ".ruff_cache",
]
typeCheckingMode = "basic"
useLibraryCodeForTypes = true
reportMissingImports = true
reportMissingTypeStubs = "none"
pythonVersion = "3.12"
